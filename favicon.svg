<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0077bb"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a0eaff"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="16" ry="16" fill="url(#bg)"/>

  <!-- Star of David -->
  <!-- Triangle pointing UP: top vertex at (50,8), base at y=74 -->
  <polygon
    points="50,8 88,74 12,74"
    fill="#00d4ff"
    fill-opacity="0.07"
    stroke="url(#starGrad)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />
  <!-- Triangle pointing DOWN: bottom vertex at (50,92), top at y=26 -->
  <polygon
    points="50,92 12,26 88,26"
    fill="#00d4ff"
    fill-opacity="0.07"
    stroke="url(#starGrad)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- 
    AMBIGRAM: "YT" upright + rotated 180° (reads YT both ways)
    Centered at (50, 50)
    Two layers: normal on top, ghost rotated 180° below
  -->

  <!-- Ghost ambigram (rotated 180°, reads as "TY" mirrored = YT flipped) -->
  <text
    x="50" y="54"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="20"
    fill="#00d4ff"
    text-anchor="middle"
    opacity="0.3"
    transform="rotate(180, 50, 50)"
    letter-spacing="1"
  >YT</text>

  <!-- Main YT text upright -->
  <text
    x="50" y="57"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="22"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="1"
  >YT</text>

  <!-- Small center circle accent -->
  <circle cx="50" cy="50" r="2" fill="#00d4ff" opacity="0.5"/>
</svg>
